<div id=topology>
  <svg id=topology-lines></svg>
  <div id=topology-columns>
    <div id=upstreams></div>
    <div id=sessions></div>
  </div>
</div>

<div class=grid>
  <div class=column>
    <h2>Bitcoin</h2>
    <div class=row><span>Block Height</span><a id=btc_height_link target=_blank rel=noopener><span id=btc_height></span></a></div>
    <div class=row><span>Network Difficulty</span><span id=network_difficulty class=copyable></span></div>
    <div class=row><span>Network Hashrate</span><span id=network_hashrate></span></div>
    <div class=row><span>Mempool Transactions</span><span id=mempool_txs></span></div>
  </div>

  <div class=column>
    <h2>System</h2>
    <div class=row><span>CPU</span><span><span id=cpu_usage_percent></span>%</span></div>
    <div class=row><span>Memory</span><span><span id=memory_usage_percent></span>%</span></div>
    <div class=row><span>Disk</span><span><span id=disk_usage_percent></span>%</span></div>
    <div class=row><span>Uptime</span><span><span id=uptime></span>s</span></div>
  </div>
</div>

<button id=log-show>Show Logs</button>
<div id=log-controls class=hidden>
  <input type=search id=log-filter placeholder="Filter logs..." autocomplete=off data-1p-ignore data-lpignore=true data-bwignore=true>
  <button id=log-pause>Pause</button>
  <button id=log-clear>Clear</button>
  <span id=log-level-controls>
    <button id=log-level-toggle>INFO</button>
    <span id=log-level-options class=hidden>
      <button class=log-level data-level=off>OFF</button>
      <button class=log-level data-level=error>ERROR</button>
      <button class=log-level data-level=warn>WARN</button>
      <button class=log-level data-level=info>INFO</button>
      <button class=log-level data-level=debug>DEBUG</button>
    </span>
  </span>
  <button id=log-hide>Hide</button>
</div>
<div id=logs class=hidden></div>

<style>
#topology { position: relative; max-width: 1060px; margin: 40px auto; }
#topology-lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#topology-columns { display: flex; justify-content: space-between; gap: 60px; }
#upstreams, #sessions { display: flex; flex-direction: column; gap: 12px; min-width: 200px; flex: 1; }
.upstream-card, .session-card { border: 1px solid #444; padding: 12px 16px; background: #1a1a1a; }
.upstream-card h3, .session-card h3 { margin: 0 0 8px; font-size: 1em; }
.upstream-card .row, .session-card .row { display: flex; justify-content: space-between; font-size: 0.9em; }
.upstream-card .status { font-size: 0.85em; }
@media (max-width: 700px) {
  #topology-columns { flex-direction: column; gap: 20px; }
  #topology-lines { display: none; }
}
</style>

<script>
async function refresh() {
  try {
    const [routerData, systemData, bitcoinData] = await Promise.all([
      fetch('/api/router/status').then(r => r.json()).catch(() => ({})),
      fetch('/api/system/status').then(r => r.json()).catch(() => ({})),
      fetch('/api/bitcoin/status').then(r => r.json()).catch(() => ({}))
    ]);

    const upstreamsEl = document.getElementById('upstreams');
    const sessionsEl = document.getElementById('sessions');
    if (upstreamsEl) upstreamsEl.innerHTML = '';
    if (sessionsEl) sessionsEl.innerHTML = '';

    const upstreams = routerData.upstreams || [];
    for (const u of upstreams) {
      const card = document.createElement('div');
      card.className = 'upstream-card';
      card.dataset.index = u.index;
      const statusClass = u.connected ? 'connected' : 'disconnected';
      const statusText = u.connected ? 'Connected' : 'Disconnected';
      card.innerHTML =
        '<h3>' + escapeHtml(u.endpoint) + '</h3>' +
        '<div class=row><span>Username</span><span class=copyable data-full="' + escapeHtml(u.username) + '" data-formatted="' + escapeHtml(u.username.length > 15 ? u.username.slice(0,6) + '...' + u.username.slice(-6) : u.username) + '">' + escapeHtml(u.username.length > 15 ? u.username.slice(0,6) + '...' + u.username.slice(-6) : u.username) + '</span></div>' +
        '<div class=row><span>Status</span><span class="status ' + statusClass + '">' + statusText + '</span></div>' +
        '<div class=row><span>Hashrate</span><span>' + formatHashrate(u.hashrate_1m) + '</span></div>' +
        '<div class=row><span>Sessions</span><span>' + u.sessions.length + '</span></div>';
      if (upstreamsEl) upstreamsEl.appendChild(card);

      for (const s of u.sessions) {
        const scard = document.createElement('div');
        scard.className = 'session-card';
        scard.dataset.upstreamIndex = u.index;
        scard.innerHTML =
          '<h3>' + escapeHtml(s.worker_name) + '</h3>' +
          '<div class=row><span>Hashrate</span><span>' + formatHashrate(s.hashrate_1m) + '</span></div>';
        if (sessionsEl) sessionsEl.appendChild(scard);
      }
    }

    initCopyables();
    drawLines();

    set('btc_height', bitcoinData.height);
    const height_link = document.getElementById('btc_height_link');
    if (height_link && bitcoinData.height !== null && bitcoinData.height !== undefined) {
      height_link.href = 'https://mempool.space/block/' + bitcoinData.height;
    }
    const network_difficulty = formatDifficulty(bitcoinData.network_difficulty);
    copyable('network_difficulty', network_difficulty, bitcoinData.network_difficulty);
    set('network_hashrate', bitcoinData.network_hashrate, formatHashrate);
    set('mempool_txs', bitcoinData.mempool_txs);

    set('cpu_usage_percent', systemData.cpu_usage_percent, formatTruncated);
    set('memory_usage_percent', systemData.memory_usage_percent, formatTruncated);
    set('disk_usage_percent', systemData.disk_usage_percent, formatTruncated);
    set('uptime', systemData.uptime);
  } catch (e) { console.error('refresh error:', e); }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function drawLines() {
  const svg = document.getElementById('topology-lines');
  if (!svg) return;
  svg.innerHTML = '';
  const container = document.getElementById('topology');
  if (!container) return;
  const containerRect = container.getBoundingClientRect();

  const sessionCards = document.querySelectorAll('.session-card');

  for (const scard of sessionCards) {
    const idx = scard.dataset.upstreamIndex;
    const ucard = document.querySelector('.upstream-card[data-index="' + idx + '"]');
    if (!ucard) continue;

    const uRect = ucard.getBoundingClientRect();
    const sRect = scard.getBoundingClientRect();

    const x1 = uRect.right - containerRect.left;
    const y1 = uRect.top + uRect.height / 2 - containerRect.top;
    const x2 = sRect.left - containerRect.left;
    const y2 = sRect.top + sRect.height / 2 - containerRect.top;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#4f4');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('opacity', '0.5');
    svg.appendChild(line);
  }

  const bbox = svg.getBBox();
  svg.setAttribute('width', container.offsetWidth);
  svg.setAttribute('height', container.offsetHeight);
}

window.addEventListener('resize', drawLines);
startPolling(refresh);
connectWs();
setupLogToggle();
initCopyables();
</script>
