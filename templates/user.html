<div class="grid grid-stack">
  <div class="column column-full">
    <h2>Info</h2>
    <div class=row><span>Address</span><span id=address class=copyable></span></div>
    <div class=row><span>Authorized</span><span id=authorized></span></div>
    <div class=row><span>Hashrate</span><span id=hashrate_1m></span></div>
    <div class=row><span>SPS</span><span id=sps_1m></span></div>
    <div class=row><span>Best Share</span><span id=best_share class=copyable></span></div>
    <div class=row><span>Last Share</span><span id=last_share></span></div>
    <div class=row><span>Rejected Shares</span><span id=rejected_shares class=copyable></span></div>
    <div class=row><span>Rejected Work</span><span id=rejected_work class=copyable></span></div>
    <div class=row><span>Delivered Hashdays</span><span id=delivered_hash_days class=copyable></span></div>
  </div>

  <div class="column-full filter-table" style="border: none; padding: 0">
    <div class=table-toolbar>
      <input id=user-search type=search placeholder="Search workers">
    </div>
  </div>

  <div class="column column-full">
    <h2>Workers (<span id=workers_count>0</span>)</h2>
    <div id=workers-root class=filter-table>
      <div class=table-scroll>
      <table id=workers-table>
        <thead>
          <tr>
            <th data-sort=name aria-sort=none>Name</th>
            <th data-sort=session_count aria-sort=none>Sessions</th>
            <th data-sort=hashrate_1m aria-sort=descending>Hashrate</th>
            <th data-sort=sps_1m aria-sort=none>SPS</th>
            <th data-sort=best_share aria-sort=none>Best Share</th>
            <th data-sort=delivered_hash_days aria-sort=none>Delivered</th>
            <th data-sort=last_share aria-sort=none>Last Share</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      </div>
      <div class=table-pagination>
        <button class=page-prev type=button>&lsaquo; Prev</button>
        <span class=page-status>1/1</span>
        <button class=page-next type=button>Next &rsaquo;</button>
      </div>
    </div>
  </div>

  <div class="column column-full">
    <h2>Sessions (<span id=sessions>0</span>)</h2>
    <div id=sessions-root class=filter-table>
      <div class=table-scroll>
      <table id=sessions-table>
        <thead>
          <tr>
            <th data-sort=username aria-sort=none>Username</th>
            <th data-sort=hashrate_1m aria-sort=descending>Hashrate</th>
            <th data-sort=sps_1m aria-sort=none>SPS</th>
            <th data-sort=best_share aria-sort=none>Best Share</th>
            <th data-sort=delivered_hash_days aria-sort=none>Delivered</th>
            <th data-sort=last_share aria-sort=none>Last Share</th>
          </tr>
        </thead>
        <tbody id=sessions-list></tbody>
      </table>
      </div>
      <div class=table-pagination>
        <button class=page-prev type=button>&lsaquo; Prev</button>
        <span class=page-status>1/1</span>
        <button class=page-next type=button>Next &rsaquo;</button>
      </div>
    </div>
  </div>
</div>

<script>
const apiBase = '{{ self.api_base }}';
const userAddress = window.location.pathname.split('/').pop();
let allWorkers = [];
let allSessions = [];

function renderWorkerRow(worker) {
  const stats = worker.stats;
  const lastShare = stats.last_share != null ? formatTimestampAgo(stats.last_share) : '-';
  const bestShare = formatDifficulty(stats.best_share);

  return `<tr>
    <td>${escapeHtml(worker.name || '(default)')}</td>
    <td>${escapeHtml(worker.session_count)}</td>
    <td>${escapeHtml(formatHashrate(stats.hashrate_1m))}</td>
    <td>${escapeHtml(formatTruncated(stats.sps_1m))}</td>
    <td>${escapeHtml(bestShare || '-')}</td>
    <td>${escapeHtml(stats.delivered_hash_days != null ? formatHashDays(stats.delivered_hash_days) : '-')}</td>
    <td>${escapeHtml(lastShare)}</td>
  </tr>`;
}

const workersTable = initFilterTable({
  root: document.getElementById('workers-root'),
  prefix: 'workers',
  defaultSort: { column: 'hashrate_1m', direction: 'desc' },
  sorts: {
    name: 'string',
    hashrate_1m: compareStat('hashrate_1m'),
    sps_1m: compareStat('sps_1m'),
    best_share: compareNullableStat('best_share'),
    delivered_hash_days: compareStat('delivered_hash_days'),
    last_share: compareNullableStat('last_share'),
  },
  ascByDefault: ['name'],
  tiebreak: (a, b) => compareString(a.name, b.name),
  renderRow: renderWorkerRow,
});

const sessionsTable = initSessionsTable(document.getElementById('sessions-root'));

async function refresh(signal) {
  const user = await fetchJsonAllow404(`${apiBase}/user/${userAddress}`, { signal });

  if (!user) {
    document.querySelector('.grid').innerHTML = '<div class="column column-full"><h2>User Not Found</h2></div>';
    stopPolling();
    return;
  }

  copyable('address', truncateMiddle(user.address, 20, 8), user.address);
  set('workers_count', user.workers.length);
  set('sessions', user.session_count);
  const s = user.stats;
  set('hashrate_1m', s.hashrate_1m, formatHashrate);
  set('sps_1m', s.sps_1m, formatTruncated);
  set('authorized', new Date(user.authorized_at * 1000).toLocaleString());
  rejectionCopyable('rejected_shares', s.accepted_shares, s.rejected_shares);
  rejectionWorkCopyable('rejected_work', s.accepted_work, s.rejected_work);
  set('last_share', s.last_share, formatTimestampAgo);
  copyable('best_share', formatDifficulty(s.best_share), s.best_share);
  copyable('delivered_hash_days', formatHashDays(s.delivered_hash_days), s.delivered_hash_days);

  allWorkers = user.workers || [];
  allSessions = user.sessions || [];
  applySearch();
}

function applySearch() {
  const term = document.getElementById('user-search').value.toLowerCase();
  const workers = term ? allWorkers.filter(w => (w.name || '').toLowerCase().includes(term)) : allWorkers;
  const sessions = term ? allSessions.filter(s => (s.username || '').toLowerCase().includes(term)) : allSessions;
  set('workers_count', workers.length);
  set('sessions', sessions.length);
  workersTable.setRows(workers);
  sessionsTable.setRows(sessions);
}

document.getElementById('user-search').addEventListener('input', applySearch);
initDelegatedCopyables('sessions-list');
startPolling(refresh);
initCopyables();
</script>
