<!doctype html>
<html lang=en>
<head>
  <meta charset=utf-8>
  <meta name=viewport content='width=device-width,initial-scale=1.0'>
  <title>Login</title>
  <link rel=icon href=/static/parasite.svg type=image/x-icon size=16x16>
  <style>
    body {
      font: clamp(14px, 1.5vw, 18px)/1.6 monospace;
      margin: 0;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 320px;
      max-width: 90vw;
    }
    .login img {
      height: 13em;
      margin-bottom: 40px;
    }
    .login input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: #111;
      border: 1px solid #444;
      color: #eee;
      font: inherit;
    }
    #login-error {
      min-height: 1.4em;
      margin-top: 10px;
      color: #f55;
      font-size: 0.85em;
      text-align: center;
    }
    .login button {
      width: 100%;
      padding: 8px 16px;
      background: #333;
      border: 1px solid #444;
      color: #eee;
      cursor: pointer;
      font: inherit;
    }
    .login button:hover { background: #444; }
    .login button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<form id=login-form class=login>
  <img src=/static/parasite.svg alt="">
  <input id=login-token type=password autocomplete=current-password>
  <button id=login-submit type=submit>Login</button>
  <div id=login-error></div>
</form>
<script>
const next = new URLSearchParams(location.search).get('next');

function safeTarget(next) {
  if (!next) return '/';

  try {
    const url = new URL(next, location.origin);
    if (url.origin !== location.origin) return '/';
    return url.pathname + url.search + url.hash;
  } catch (_) {
    return '/';
  }
}

const target = safeTarget(next);

const input = document.getElementById('login-token');
const error = document.getElementById('login-error');
const submit = document.getElementById('login-submit');

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const token = input.value;
  if (!token) {
    error.textContent = 'Token is required';
    return;
  }

  error.textContent = '';
  submit.disabled = true;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ token }),
    });

    if (res.status === 401) {
      error.textContent = 'Invalid token';
      return;
    }

    if (!res.ok) {
      error.textContent = `Error: ${res.status}`;
      return;
    }

    location.href = target;
  } catch (e) {
    error.textContent = e.message;
  } finally {
    submit.disabled = false;
  }
});

input.focus();
</script>
</body>
</html>
